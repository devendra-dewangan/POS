steps:
  build:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    commands:
      - echo "Running Build Stage"
      - dotnet restore POS/POS.csproj
      - dotnet build POS/POS.csproj --configuration Release --no-restore
    when:
      - event: push
        evaluate: CI_COMMIT_BRANCH == "master"
      - event: manual
        evaluate: STAGE == "build"

  test:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    depends_on: [ build ]
    commands:
      - echo "Running Test Stage"
      - dotnet test POS/POS.csproj --configuration Release --no-build
    when:
      - event: push
        evaluate: CI_COMMIT_BRANCH == "master"
      - event: manual
        evaluate: STAGE == "test"

  docker-build:
    image: docker:24
    depends_on: [ test ]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - echo "Running Docker Build Stage"
      - SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
      - docker build -t pos-app:$SHORT_SHA .
    when:
      - event: push
        evaluate: CI_COMMIT_BRANCH == "master"
      - event: manual
        evaluate: STAGE == "docker"

  docker-push:
    image: docker:24
    depends_on: [ docker-build ]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - echo "Running Docker Push Stage"
      - SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
      - echo "$DOCKER_PASSWORD" | docker login $DOCKER_REGISTRY -u "$DOCKER_USERNAME" --password-stdin
      - docker tag pos-app:$SHORT_SHA $DOCKER_REGISTRY/pos-app:$SHORT_SHA
      - docker push $DOCKER_REGISTRY/pos-app:$SHORT_SHA
    when:
      - event: push
        evaluate: CI_COMMIT_BRANCH == "master"
      - event: manual
        evaluate: STAGE == "push"