steps:
  build:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    commands:
      - echo "Running Build Stage"
      - dotnet restore POS/POS.csproj
      - dotnet build POS/POS.csproj --configuration Release --no-restore
    when:
      - event: push
        evaluate: CI_COMMIT_BRANCH == "master"
      - event: manual
        evaluate: STAGE == "build" || STAGE == "all" || STAGE == "push"

  test:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    depends_on: [ build ]
    commands:
      - echo "Running Test Stage"
      - dotnet test POS/POS.csproj --configuration Release --no-build
    when:
      - event: push
        evaluate: CI_COMMIT_BRANCH == "master"
      - event: manual
        evaluate: STAGE == "test" || STAGE == "all"

  docker-build:
    image: docker:24
    depends_on: [ build ]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - echo "Running Docker Build Stage"
      - SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
      - docker build -t pos-app:$SHORT_SHA .
    when:
      - event: push
        evaluate: CI_COMMIT_BRANCH == "master"
      - event: manual
        evaluate: STAGE == "docker" || STAGE == "push" || STAGE == "all"

  docker-push:
    image: woodpeckerci/plugin-docker-buildx
    depends_on: [ docker-build ]
    settings:
      repo: reg-devdew.chub-beta.ts.net/pos-app
      tags:
        - ${CI_COMMIT_SHA:0:7}
    when:
      - event: push
        evaluate: CI_COMMIT_BRANCH == "master"
      - event: manual
        evaluate: STAGE == "push" || STAGE == "all"